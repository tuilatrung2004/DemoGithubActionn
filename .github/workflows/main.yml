name: Read and Search README

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      keyword:
        description: 'Nhập từ khóa cần tìm trong file README'
        required: true
        default: 'Cài đặt' # Từ khóa mặc định

jobs:
  search-file:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout mã nguồn
      uses: actions/checkout@v4

    - name: Đọc toàn bộ nội dung README
      run: |
        echo "=== NỘI DUNG FILE ==="
        cat README.md
        echo "====================="

    - name: Tìm kiếm từ khóa
      env:
        # Lấy từ khóa người dùng nhập, nếu chạy tự động do push thì dùng chữ 'Cài đặt'
        KEYWORD: ${{ github.event.inputs.keyword || 'Cài đặt' }}
      run: |
        echo "Đang tìm kiếm từ khóa: '$KEYWORD'"
        echo "Kết quả (số dòng : nội dung):"
        
        # Lệnh grep dùng để tìm kiếm. Thêm '|| true' để kịch bản không bị báo lỗi (màu đỏ) nếu không tìm thấy từ khóa.
        grep -n -i "$KEYWORD" README.md || echo "Không tìm thấy từ khóa này trong file."
