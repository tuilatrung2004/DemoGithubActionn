name: Read and Search README

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      keyword:
        description: 'Nhập từ khóa cần tìm trong file README'
        required: true
        default: 'Cài đặt' # Từ khóa mặc định

jobs:
  search-file:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout mã nguồn
      uses: actions/checkout@v4

    - name: Đọc toàn bộ nội dung README
      run: |
        echo "=== NỘI DUNG FILE ==="
        cat README.md
        echo "====================="

    - name: Tìm kiếm từ khóa
      env:
        # Lấy từ khóa người dùng nhập, nếu chạy tự động do push thì dùng chữ 'Cài đặt'
        KEYWORD: ${{ github.event.inputs.keyword || 'Cài đặt' }}
      run: |
        echo "Đang tìm kiếm từ khóa: '$KEYWORD'"
        echo "Kết quả (số dòng : nội dung):"
        
        # Lệnh grep dùng để tìm kiếm. Thêm '|| true' để kịch bản không bị báo lỗi (màu đỏ) nếu không tìm thấy từ khóa.
        grep -n -i "$KEYWORD" README.md || echo "Không tìm thấy từ khóa này trong file."
    - name: Triển khai lên DevOps Classroom
        run: |
          REPO="nguyenanhphu/demogithubactionn"
          CONTAINER_PORT=80
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=4&container_port=$CONTAINER_PORT")
          BODY=$(echo "$RESPONSE" | sed "$d")
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
            echo "::group::Chi tiết webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          echo "Deploy thành công."
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
